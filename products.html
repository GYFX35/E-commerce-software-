<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern E-Commerce - Products</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">E-Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count" class="badge bg-danger">0</span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Product Header -->
    <header class="bg-secondary text-white text-center py-4">
        <div class="container">
            <h1>Our Products</h1>
        </div>
    </header>

    <!-- Product List -->
    <section class="py-5">
        <div class="container">
            <div class="row">
                <!-- Sidebar / Filters -->
                <aside class="col-md-3">
                    <div class="card mb-4">
                        <div class="card-header bg-primary text-white">Categories</div>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item"><a href="#" class="text-decoration-none">Electronics</a></li>
                            <li class="list-group-item"><a href="#" class="text-decoration-none">Fashion</a></li>
                            <li class="list-group-item"><a href="#" class="text-decoration-none">Home & Garden</a></li>
                        </ul>
                    </div>
                </aside>

                <!-- Products Grid -->
                <main class="col-md-9">
                    <div class="row" id="product-grid">
                        <!-- Product 1 -->
                        <div class="col-md-4 mb-4">
                            <div class="card h-100">
                                <img src="https://via.placeholder.com/200x150" class="card-img-top" alt="Product 1">
                                <div class="card-body text-center">
                                    <h5 class="card-title">Smartphone X Pro</h5>
                                    <p class="card-text text-muted">$999.00</p>
                                    <a href="product-detail.html?id=1" class="btn btn-outline-primary">View</a>
                                    <button class="btn btn-primary add-to-cart" data-id="1" data-name="Smartphone X Pro" data-price="999.00">Add to Cart</button>
                                </div>
                            </div>
                        </div>
                        <!-- Product 2 -->
                        <div class="col-md-4 mb-4">
                            <div class="card h-100">
                                <img src="https://via.placeholder.com/200x150" class="card-img-top" alt="Product 2">
                                <div class="card-body text-center">
                                    <h5 class="card-title">Wireless Headphones</h5>
                                    <p class="card-text text-muted">$199.00</p>
                                    <a href="product-detail.html?id=2" class="btn btn-outline-primary">View</a>
                                    <button class="btn btn-primary add-to-cart" data-id="2" data-name="Wireless Headphones" data-price="199.00">Add to Cart</button>
                                </div>
                            </div>
                        </div>
                        <!-- Product 3 -->
                        <div class="col-md-4 mb-4">
                            <div class="card h-100">
                                <img src="https://via.placeholder.com/200x150" class="card-img-top" alt="Product 3">
                                <div class="card-body text-center">
                                    <h5 class="card-title">Smart Watch 5</h5>
                                    <p class="card-text text-muted">$299.00</p>
                                    <a href="product-detail.html?id=3" class="btn btn-outline-primary">View</a>
                                    <button class="btn btn-primary add-to-cart" data-id="3" data-name="Smart Watch 5" data-price="299.00">Add to Cart</button>
                                </div>
                            </div>
                        </div>
                        <!-- Product 4 -->
                        <div class="col-md-4 mb-4">
                            <div class="card h-100">
                                <img src="https://via.placeholder.com/200x150" class="card-img-top" alt="Product 4">
                                <div class="card-body text-center">
                                    <h5 class="card-title">Laptop Pro 14</h5>
                                    <p class="card-text text-muted">$1299.00</p>
                                    <a href="product-detail.html?id=4" class="btn btn-outline-primary">View</a>
                                    <button class="btn btn-primary add-to-cart" data-id="4" data-name="Laptop Pro 14" data-price="1299.00">Add to Cart</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2025 E-Shop. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/script.js"></script>
</body>
</html>
